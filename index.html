<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Time Tracker</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="app">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="logo">
        <span class="logo-icon">⏱</span>
        <span class="logo-text">TrackIt</span>
      </div>

      <nav class="nav">
        <button class="nav-btn active" data-tab="timer">
          <span class="nav-icon">▶</span> Таймер
        </button>
        <button class="nav-btn" data-tab="history">
          <span class="nav-icon">📋</span> История
        </button>
        <button class="nav-btn" data-tab="stats">
          <span class="nav-icon">📊</span> Статистика
        </button>
      </nav>

      <div class="projects-section">
        <div class="projects-header">
          <h3>Проекты</h3>
          <button class="btn-add-project" id="btnAddProject">+</button>
        </div>
        <ul class="projects-list" id="projectsList"></ul>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main">

      <!-- Timer Tab -->
      <section class="tab-content active" id="tabTimer">
        <div class="timer-card">
          <div class="timer-display" id="timerDisplay">00:00:00</div>

          <div class="timer-task">
            <input
              type="text"
              id="taskInput"
              class="task-input"
              placeholder="Над чем работаешь?"
            />
            <select id="projectSelect" class="project-select">
              <option value="">Без проекта</option>
            </select>
          </div>

          <div class="timer-controls">
            <button class="btn-timer btn-start" id="btnStart">▶ Старт</button>
            <button class="btn-timer btn-pause hidden" id="btnPause">⏸ Пауза</button>
            <button class="btn-timer btn-stop hidden" id="btnStop">⏹ Стоп</button>
          </div>

          <!-- Manual Entry Toggle -->
          <div class="manual-toggle">
            <button class="btn-manual" id="btnManualToggle">
              ✏️ Добавить вручную
            </button>
          </div>

          <div class="manual-entry hidden" id="manualEntry">
            <h3>Ручной ввод</h3>
            <div class="manual-fields">
              <div class="field">
                <label>Задача</label>
                <input type="text" id="manualTask" placeholder="Название задачи" />
              </div>
              <div class="field">
                <label>Проект</label>
                <select id="manualProject">
                  <option value="">Без проекта</option>
                </select>
              </div>
              <div class="field-row">
                <div class="field">
                  <label>Начало</label>
                  <input type="datetime-local" id="manualStart" />
                </div>
                <div class="field">
                  <label>Конец</label>
                  <input type="datetime-local" id="manualEnd" />
                </div>
              </div>
              <button class="btn-save" id="btnManualSave">💾 Сохранить</button>
            </div>
          </div>
        </div>

        <!-- Today's entries -->
        <div class="today-section">
          <h2>Сегодня</h2>
          <div class="today-total">
            Итого: <span id="todayTotal">0ч 0м</span>
          </div>
          <div class="entries-list" id="todayEntries"></div>
        </div>
      </section>

      <!-- History Tab -->
      <section class="tab-content" id="tabHistory">
        <h2>История</h2>
        <div class="history-filters">
          <input type="date" id="filterFrom" />
          <span>—</span>
          <input type="date" id="filterTo" />
          <select id="filterProject">
            <option value="">Все проекты</option>
          </select>
          <button class="btn-filter" id="btnFilter">Показать</button>
          <button class="btn-export" id="btnExport">📥 Экспорт CSV</button>
        </div>
        <div class="history-list" id="historyList"></div>
      </section>

      <!-- Stats Tab -->
      <section class="tab-content" id="tabStats">
        <h2>Статистика</h2>
        <div class="stats-period">
          <button class="stats-btn active" data-period="week">Неделя</button>
          <button class="stats-btn" data-period="month">Месяц</button>
          <button class="stats-btn" data-period="all">Всё время</button>
        </div>

        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-value" id="statTotal">0ч</div>
            <div class="stat-label">Всего</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="statAvg">0ч</div>
            <div class="stat-label">Среднее / день</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="statEntries">0</div>
            <div class="stat-label">Записей</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="statTopProject">—</div>
            <div class="stat-label">Топ проект</div>
          </div>
        </div>

        <!-- Bar Chart -->
        <div class="chart-section">
          <h3>По дням</h3>
          <div class="chart" id="barChart"></div>
        </div>

        <!-- Project Breakdown -->
        <div class="breakdown-section">
          <h3>По проектам</h3>
          <div class="breakdown" id="projectBreakdown"></div>
        </div>
      </section>

    </main>
  </main>

  </div>

  <script src="app.js"></script>
</body>
</html>
