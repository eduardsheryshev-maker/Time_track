<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrackIt</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

<div class="flex min-h-screen">

  <!-- ═══════ SIDEBAR ═══════ -->
  <aside class="w-[240px] shrink-0 border-r p-4 flex flex-col gap-1 fixed top-0 left-0 h-screen overflow-y-auto"
         style="border-color:var(--border); background:var(--bg-soft);">

    <!-- Logo -->
    <div class="flex items-center gap-2 px-2 pt-1 pb-4">
      <span class="text-lg">⏱</span>
      <span class="text-base font-semibold" style="color:var(--text);">TrackIt</span>
    </div>

    <!-- Nav -->
    <nav class="flex flex-col gap-0.5 mb-6" id="nav">
      <button class="nav-btn active btn-notion btn-ghost w-full justify-start" data-tab="timer">
        <svg class="w-4 h-4 opacity-60" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Таймер
      </button>
      <button class="nav-btn btn-notion btn-ghost w-full justify-start" data-tab="history">
        <svg class="w-4 h-4 opacity-60" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        История
      </button>
      <button class="nav-btn btn-notion btn-ghost w-full justify-start" data-tab="stats">
        <svg class="w-4 h-4 opacity-60" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        Статистика
      </button>
    </nav>

    <!-- Projects -->
    <div class="mt-auto">
      <div class="flex items-center justify-between px-2 mb-2">
        <span class="text-[11px] font-medium uppercase tracking-wider" style="color:var(--text3);">Проекты</span>
        <button class="btn-notion btn-ghost p-1 text-xs" style="color:var(--text3);" id="btnAddProject" title="Добавить проект">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>
      <div id="projectsList" class="flex flex-col gap-0.5"></div>
    </div>

    <!-- Theme Switcher -->
    <div class="mt-6 pt-4 px-2" style="border-top:1px solid var(--border);">
      <span class="text-[11px] font-medium uppercase tracking-wider block mb-2" style="color:var(--text3);">Тема</span>
      <div class="flex gap-2 flex-wrap" id="themeSwitcher">
        <button class="theme-swatch" data-theme-value="light"  style="background:#ffffff;" title="Light"></button>
        <button class="theme-swatch" data-theme-value="dark"   style="background:#191919;" title="Dark"></button>
        <button class="theme-swatch" data-theme-value="slate"  style="background:#14192a;" title="Slate"></button>
        <button class="theme-swatch" data-theme-value="forest" style="background:#121a14;" title="Forest"></button>
        <button class="theme-swatch" data-theme-value="sand"   style="background:#1a1610;" title="Sand"></button>
      </div>
    </div>
  </aside>

  <!-- ═══════ MAIN ═══════ -->
  <main class="flex-1 ml-[240px] max-w-[780px] px-10 py-8">

    <!-- ── TIMER TAB ── -->
    <section class="tab-content active" id="tabTimer">

      <!-- Timer card -->
      <div class="rounded-xl p-8 mb-8 anim-fade-up"
           style="background:var(--bg-soft); border:1px solid var(--border);">

        <!-- Timer display -->
        <div class="text-center mb-6">
          <div class="timer-mono text-6xl font-extralight tracking-wide" id="timerDisplay"
               style="color:var(--text);">
            00:00:00
          </div>
          <div class="flex items-center justify-center gap-1.5 mt-2 h-5" id="timerStatus"></div>
        </div>

        <!-- Task input row -->
        <div class="flex gap-3 mb-6">
          <input type="text" id="taskInput" class="input-notion flex-1" placeholder="Над чем работаешь?" />
          <select id="projectSelect" class="select-notion min-w-[150px]">
            <option value="">Без проекта</option>
          </select>
        </div>

        <!-- Controls -->
        <div class="flex items-center justify-center gap-3" id="timerControls">
          <button class="btn-notion btn-success px-6 py-2 text-sm" id="btnStart">
            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            Старт
          </button>
          <button class="btn-notion btn-soft px-6 py-2 text-sm hidden" id="btnPause">
            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
            Пауза
          </button>
          <button class="btn-notion px-6 py-2 text-sm hidden" id="btnStop"
                  style="background:var(--danger-bg); color:var(--danger);">
            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="1"/></svg>
            Стоп
          </button>
        </div>

        <!-- Manual entry toggle -->
        <div class="text-center mt-5">
          <button class="btn-notion btn-ghost text-xs" id="btnManualToggle" style="color:var(--text3);">
            ✏️ Добавить вручную
          </button>
        </div>

        <!-- Manual entry form -->
        <div class="hidden mt-5 pt-5 anim-fade-up" id="manualEntry" style="border-top:1px solid var(--border);">
          <div class="text-xs font-medium uppercase tracking-wider mb-3" style="color:var(--text3);">Ручной ввод</div>
          <div class="flex flex-col gap-3">
            <div class="flex gap-3">
              <input type="text" id="manualTask" class="input-notion flex-1" placeholder="Название задачи" />
              <select id="manualProject" class="select-notion min-w-[150px]">
                <option value="">Без проекта</option>
              </select>
            </div>
            <div class="flex gap-3">
              <div class="flex-1">
                <label class="text-[11px] font-medium uppercase tracking-wider mb-1 block" style="color:var(--text3);">Начало</label>
                <input type="datetime-local" id="manualStart" class="input-notion" />
              </div>
              <div class="flex-1">
                <label class="text-[11px] font-medium uppercase tracking-wider mb-1 block" style="color:var(--text3);">Конец</label>
                <input type="datetime-local" id="manualEnd" class="input-notion" />
              </div>
            </div>
            <button class="btn-notion btn-accent self-end px-5 py-2" id="btnManualSave">Сохранить</button>
          </div>
        </div>
      </div>

      <!-- Today -->
      <div>
        <div class="flex items-baseline justify-between mb-3">
          <h2 class="text-lg font-semibold">Сегодня</h2>
          <span class="text-sm" style="color:var(--text3);" id="todayTotal">0ч 0м</span>
        </div>
        <div class="flex flex-col gap-1" id="todayEntries"></div>
      </div>

    </section>

    <!-- ── HISTORY TAB ── -->
    <section class="tab-content hidden" id="tabHistory">
      <h2 class="text-lg font-semibold mb-4">История</h2>
      <div class="flex items-center gap-2 flex-wrap mb-6">
        <input type="date" id="filterFrom" class="input-notion w-auto" />
        <span style="color:var(--text3);">—</span>
        <input type="date" id="filterTo" class="input-notion w-auto" />
        <select id="filterProject" class="select-notion">
          <option value="">Все проекты</option>
        </select>
        <button class="btn-notion btn-accent px-4" id="btnFilter">Показать</button>
        <button class="btn-notion btn-soft ml-auto" id="btnExport">📥 CSV</button>
      </div>
      <div id="historyList"></div>
    </section>

    <!-- ── STATS TAB ── -->
    <section class="tab-content hidden" id="tabStats">
      <h2 class="text-lg font-semibold mb-4">Статистика</h2>

      <div class="flex gap-1 mb-6" id="statsPeriodBtns">
        <button class="btn-notion btn-soft active text-xs" data-period="week">Неделя</button>
        <button class="btn-notion btn-soft text-xs" data-period="month">Месяц</button>
        <button class="btn-notion btn-soft text-xs" data-period="all">Всё время</button>
      </div>

      <!-- Stat cards -->
      <div class="grid grid-cols-4 gap-3 mb-6" id="statsCards">
        <div class="rounded-lg p-4 text-center" style="background:var(--surface); border:1px solid var(--border);">
          <div class="text-2xl font-bold" style="color:var(--accent);" id="statTotal">0ч</div>
          <div class="text-[11px] uppercase tracking-wider mt-1" style="color:var(--text3);">Всего</div>
        </div>
        <div class="rounded-lg p-4 text-center" style="background:var(--surface); border:1px solid var(--border);">
          <div class="text-2xl font-bold" style="color:var(--accent);" id="statAvg">0ч</div>
          <div class="text-[11px] uppercase tracking-wider mt-1" style="color:var(--text3);">В среднем / день</div>
        </div>
        <div class="rounded-lg p-4 text-center" style="background:var(--surface); border:1px solid var(--border);">
          <div class="text-2xl font-bold" style="color:var(--accent);" id="statEntries">0</div>
          <div class="text-[11px] uppercase tracking-wider mt-1" style="color:var(--text3);">Записей</div>
        </div>
        <div class="rounded-lg p-4 text-center" style="background:var(--surface); border:1px solid var(--border);">
          <div class="text-2xl font-bold" style="color:var(--accent);" id="statTopProject">—</div>
          <div class="text-[11px] uppercase tracking-wider mt-1" style="color:var(--text3);">Топ проект</div>
        </div>
      </div>

      <!-- Chart -->
      <div class="rounded-lg p-5 mb-5" style="background:var(--surface); border:1px solid var(--border);">
        <div class="text-xs font-medium uppercase tracking-wider mb-4" style="color:var(--text3);">По дням</div>
        <div class="flex items-end gap-1.5" style="height:140px;" id="barChart"></div>
      </div>

      <!-- Breakdown -->
      <div class="rounded-lg p-5" style="background:var(--surface); border:1px solid var(--border);">
        <div class="text-xs font-medium uppercase tracking-wider mb-4" style="color:var(--text3);">По проектам</div>
        <div id="projectBreakdown"></div>
      </div>
    </section>

  </main>
</div>

<script type="module" src="/app.js"></script>
</body>
</html>
